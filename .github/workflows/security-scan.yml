name: Security Scan Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  sast-scan:
    name: SAST - SonarQube Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: pip install bandit pylint safety
      
      - name: Run Bandit (Security)
        run: bandit -r . -f json -o bandit-report.json || true
      
      - name: Run Pylint (Quality)
        run: pylint **/*.py --output-format=json > pylint-report.json || true
      
      - name: Run Safety (Dependencies)
        run: safety check --json > safety-report.json || true
      
      - name: Upload SAST Reports
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: |
            bandit-report.json
            pylint-report.json
            safety-report.json

  dast-scan:
    name: DAST - OWASP ZAP Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Start VAmPI Application
        run: |
          docker run -d -p 5000:5000 --name vampi erev0s/vampi:latest
          sleep 10
      
      - name: Initialize Database
        run: curl http://localhost:5000/createdb
      
      - name: OWASP ZAP Baseline Scan
        run: |
          docker run --network host -v $(pwd):/zap/wrk/:rw \
            -t ghcr.io/zaproxy/zaproxy:stable bash -c \
            "zap-baseline.py -t http://localhost:5000 -r zap-report.html -J zap-report.json || true"
      
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            zap-report.html
            zap-report.json
      
      - name: Stop VAmPI
        if: always()
        run: docker stop vampi && docker rm vampi

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [sast-scan, dast-scan]
    if: always()
    steps:
      - name: Display Summary
        run: |
          echo "✅ Security scans completed"
          echo "📊 SAST: SonarQube analysis finished"
          echo "📊 DAST: OWASP ZAP scan finished"
          echo "Check artifacts and SonarQube dashboard for detailed reports"
