name: Security Scan Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  sast-scan:
    name: SAST - SonarQube Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: pip install bandit pylint safety
      
      - name: Run Bandit (Security)
        run: bandit -r . -f json -o bandit-report.json || true
      
      - name: Run Pylint (Quality)
        run: pylint **/*.py --output-format=json > pylint-report.json || true
      
      - name: Run Safety (Dependencies)
        run: safety check --json > safety-report.json || true
      
      - name: Generate Security Summary
        run: |
          echo "# 🔒 Security Scan Results" > security-summary.md
          echo "" >> security-summary.md
          
          echo "## 📊 Bandit (SAST)" >> security-summary.md
          BANDIT_ISSUES=$(jq '.results | length' bandit-report.json)
          echo "- Issues found: $BANDIT_ISSUES" >> security-summary.md
          jq -r '.results[] | "- \(.issue_severity): \(.issue_text) (\(.filename):\(.line_number))"' bandit-report.json >> security-summary.md || true
          echo "" >> security-summary.md
          
          echo "## 📊 Safety (Dependencies)" >> security-summary.md
          SAFETY_VULNS=$(jq '.vulnerabilities | length' safety-report.json)
          echo "- Vulnerabilities found: $SAFETY_VULNS" >> security-summary.md
          jq -r '.vulnerabilities[] | "- \(.package_name) \(.analyzed_version): \(.CVE // "No CVE") - \(.advisory[:100])..."' safety-report.json >> security-summary.md || true
          
          cat security-summary.md
      
      - name: Upload SAST Reports
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: |
            bandit-report.json
            pylint-report.json
            safety-report.json
            security-summary.md

  dast-scan:
    name: DAST - OWASP ZAP Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Start VAmPI Application
        run: |
          docker run -d -p 5000:5000 --name vampi erev0s/vampi:latest
          sleep 10
      
      - name: Initialize Database
        run: curl http://localhost:5000/createdb
      
      - name: OWASP ZAP Baseline Scan
        run: |
          docker run --network host -v $(pwd):/zap/wrk/:rw \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:5000 -r /zap/wrk/zap-report.html -J /zap/wrk/zap-report.json || true
      
      - name: List generated files
        run: ls -la *.html *.json || true
      
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: |
            zap-report.html
            zap-report.json
          if-no-files-found: warn
      
      - name: Stop VAmPI
        if: always()
        run: docker stop vampi && docker rm vampi

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [sast-scan, dast-scan]
    if: always()
    steps:
      - name: Download Reports
        uses: actions/download-artifact@v4
        with:
          name: sast-reports
      
      - name: Display Summary
        run: |
          echo "# 🔒 Security Pipeline Results"
          echo ""
          if [ -f security-summary.md ]; then
            cat security-summary.md
          else
            echo "⚠️ Summary file not found"
          fi
          echo ""
          echo "📊 Check artifacts for detailed reports"
